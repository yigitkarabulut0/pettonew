version: "2"
sql:
  - engine: "postgresql"
    queries: "./db/queries"
    schema: "./db/migrations"
    gen:
      go:
        package: "sqlcgen"
        out: "./db/sqlcgen"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type: "string"
          - db_type: "text"
            go_type: "string"
          - db_type: "varchar"
            go_type: "string"
          - db_type: "smallint"
            go_type: "int32"
          - db_type: "jsonb"
            go_type: "encoding/json.RawMessage"
          - db_type: "text[]"
            go_type:
              import: "github.com/lib/pq"
              type: "StringArray"
        rename:
          pet_species: PetSpecies
